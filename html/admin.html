<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Access | NORDLUXE</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d0d10 0%, #13100c 55%, #1a1408 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      width: 100%;
      max-width: 420px;
      margin: 24px;
      background: linear-gradient(160deg, #1a1711 0%, #111015 100%);
      border: 1px solid rgba(209,155,72,0.35);
      border-radius: 18px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,220,150,0.07);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #1c1608, #2b1e07);
      padding: 32px 36px 24px;
      text-align: center;
      border-bottom: 1px solid rgba(209,155,72,0.25);
    }

    .logo-mark {
      display: inline-block;
      width: 62px;
      height: 62px;
      background: linear-gradient(145deg, #8a6220, #d4a84a);
      border-radius: 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 14px;
    }

    .brand-name {
      color: #d4af37;
      font-size: 22px;
      letter-spacing: 5px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .brand-sub {
      color: #7a6035;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .card-body {
      padding: 32px 36px;
    }

    .section-label {
      color: #c8a84e;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .field-group {
      margin-bottom: 18px;
    }

    .field-group label {
      display: block;
      color: #a08855;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .field-input {
      width: 100%;
      padding: 13px 16px;
      background: linear-gradient(180deg, #0d0c0a, #110f0c);
      border: 1px solid rgba(209,155,72,0.28);
      border-radius: 10px;
      color: #f0ddb0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field-input::placeholder { color: #5a4929; }

    .field-input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
    }

    .enter-btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: linear-gradient(145deg, #7f5a22, #c49a38);
      color: #fff7e2;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,225,150,0.15);
    }

    .enter-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .enter-btn:active { transform: translateY(0); }
    .enter-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }

    .error-msg {
      display: none;
      color: #f98080;
      font-size: 13px;
      margin-top: 12px;
      padding: 10px 13px;
      background: rgba(249,128,128,0.08);
      border: 1px solid rgba(249,128,128,0.25);
      border-radius: 8px;
      text-align: center;
    }

    .error-msg.show { display: block; }

    .card-footer {
      padding: 16px 36px 22px;
      text-align: center;
      border-top: 1px solid rgba(209,155,72,0.12);
      color: #4a3e28;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .spinner-inline {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,247,226,0.3);
      border-top-color: #fff7e2;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .spinner-inline.show { display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .card-header, .card-body, .card-footer { padding-left: 22px; padding-right: 22px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="logo-mark">🏔</div>
      <div class="brand-name">NORDLUXE</div>
      <div class="brand-sub">Admin Portal</div>
    </div>

    <div class="card-body">
      <div class="section-label">Secure Access</div>

      <div class="field-group">
        <label for="keyInput">Admin Key</label>
        <input
          type="password"
          id="keyInput"
          class="field-input"
          placeholder="Enter your admin key"
          autocomplete="current-password"
          autofocus
        >
      </div>

      <button class="enter-btn" id="enterBtn" onclick="handleEnter()">
        <span id="btnLabel">Enter Dashboard</span>
        <span class="spinner-inline" id="btnSpinner"></span>
      </button>

      <div class="error-msg" id="errorMsg">Incorrect admin key. Please try again.</div>
    </div>

    <div class="card-footer">NORDLUXE &nbsp;·&nbsp; Internal Use Only</div>
  </div>

  <script>
    const ADMIN_ORDERS_URL = '/html/admin-orders.html';
    const API_BASES = (() => {
      const configuredApiBase = (window.NORDLUXE_API_BASE || '').trim();
      const host = window.location.hostname;
      const protocol = window.location.protocol;
      const port = window.location.port;
      const origin = host ? `${protocol}//${host}${port ? `:${port}` : ''}` : '';
      const candidates = [];

      if (configuredApiBase) {
        candidates.push(configuredApiBase);
      }

      if (protocol === 'file:' || !host || host === 'localhost' || host === '127.0.0.1' || port === '5500') {
        candidates.push('http://127.0.0.1:3001', 'http://localhost:3001');
      }

      if (origin && origin !== 'null') {
        candidates.push(origin);
      }

      return Array.from(new Set(candidates));
    })();

    async function apiFetch(path, options) {
      let lastError = null;
      for (const base of API_BASES) {
        try {
          return await fetch(`${base}${path}`, options);
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error('No reachable API base.');
    }

    const keyInput = document.getElementById('keyInput');
    const enterBtn = document.getElementById('enterBtn');
    const btnLabel = document.getElementById('btnLabel');
    const btnSpinner = document.getElementById('btnSpinner');
    const errorMsg = document.getElementById('errorMsg');

    keyInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') handleEnter();
      errorMsg.classList.remove('show');
    });

    async function handleEnter() {
      const key = keyInput.value.trim();
      if (!key) {
        errorMsg.textContent = 'Please enter your admin key.';
        errorMsg.classList.add('show');
        return;
      }

      setLoading(true);
      errorMsg.classList.remove('show');

      try {
        const res = await apiFetch('/api/orders', {
          method: 'GET',
          headers: { 'x-admin-key': key }
        });

        if (res.status === 403) {
          setLoading(false);
          errorMsg.textContent = 'Incorrect admin key. Please try again.';
          errorMsg.classList.add('show');
          keyInput.focus();
          return;
        }

        if (!res.ok) {
          setLoading(false);
          errorMsg.textContent = 'Could not reach server. Make sure the backend is running.';
          errorMsg.classList.add('show');
          return;
        }

        // Key is valid — persist and redirect
        localStorage.setItem('nordluxeAdminKey', key);
        window.location.href = ADMIN_ORDERS_URL;

      } catch (err) {
        setLoading(false);
        errorMsg.textContent = 'Unable to connect to server. Is the backend running?';
        errorMsg.classList.add('show');
      }
    }

    function setLoading(on) {
      enterBtn.disabled = on;
      btnLabel.style.display = on ? 'none' : 'inline';
      btnSpinner.classList.toggle('show', on);
    }

    // If already logged in, skip straight to dashboard
    (function () {
      const saved = localStorage.getItem('nordluxeAdminKey');
      if (saved) {
        keyInput.value = saved;
      }
    })();
  </script>
</body>
</html>
