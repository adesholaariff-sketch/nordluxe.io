<!-- Firebase SDK -->
<script type="module">
  // ✅ IMPORT EVERYTHING HERE
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  // ✅ YOUR CONFIG (leave as is)
  const firebaseConfig = {
    apiKey: "AIzaSyCLqR3N_V_0U_2bTcchgsDFqjqSTCahxYs",
    authDomain: "nordluxe-e30a4.firebaseapp.com",
    projectId: "nordluxe-e30a4",
    storageBucket: "nordluxe-e30a4.firebasestorage.app",
    messagingSenderId: "997971219569",
    appId: "1:997971219569:web:b29fd19a59ec3fb345f7d0"
  };

  // ✅ INIT
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // Keep email auth helpers available to the classic script below
  window.firebaseAuth = auth;
  window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
  window.signInWithEmailAndPassword = signInWithEmailAndPassword;
  window.sendPasswordResetEmail = sendPasswordResetEmail;

  // 🔥 GOOGLE LOGIN (REAL)
  window.handleGoogleAuth = function () {
    signInWithPopup(auth, provider)
      .then((result) => {
        const user = {
          id: result.user.uid,
          name: result.user.displayName,
          email: result.user.email,
          profilePic: result.user.photoURL
        };

        localStorage.setItem('nordluxeUser', JSON.stringify(user));
        localStorage.setItem('nordluxeLoggedIn', 'true');

        alert('Login successful');
        location.reload();
      })
      .catch((error) => {
        console.error(error);
        alert(error.message);
      });
  };

  // Existing buttons call loginWithGoogle(), so map it to the popup handler
  window.loginWithGoogle = window.handleGoogleAuth;
</script>

}

.user-btn {

  transition: all 0.3s ease;

  transform: scale(1.1);

  box-shadow: 0 6px 20px rgba(209,155,72,0.5);

.user-dropdown {
  position: absolute;
  top: 50px;
  left: 0;
  background: #ffffff;
  border: 1px solid #d19b48;
  border-radius: 8px;
  min-width: 180px;

  padding: 12px 16px;

}

<script>

function showEmailForm() {
document.querySelector('.email-form').classList.add('show');
document.querySelector('.password-form').classList.remove('show');
document.querySelector('.login-options').style.display = 'none';
document.querySelector('.divider').style.display = 'none';
}

function showPasswordForm() {
document.querySelector('.password-form').classList.add('show');
document.querySelector('.email-form').classList.remove('show');
document.querySelector('.login-options').style.display = 'none';
document.querySelector('.divider').style.display = 'none';
}

function showSignIn() {
document.getElementById('signinForm').style.display = 'block';
document.getElementById('signupForm').style.display = 'none';
document.querySelectorAll('.toggle-btn')[0].classList.add('active');
document.querySelectorAll('.toggle-btn')[1].classList.remove('active');
}

function showSignUp() {
document.getElementById('signinForm').style.display = 'none';
document.getElementById('signupForm').style.display = 'block';
document.querySelectorAll('.toggle-btn')[0].classList.remove('active');
document.querySelectorAll('.toggle-btn')[1].classList.add('active');
}

function backToEmail() {
  document.getElementById('otpForm').style.display = 'none';
  document.querySelector('form[onsubmit="sendOTP(event)"]').style.display = 'block';
}

function showMessage(message, type) {
  const msgDiv = document.getElementById('message');
  msgDiv.innerHTML = `<div class="message ${type}">${message}</div>`;
  setTimeout(() => msgDiv.innerHTML = '', 5000);
}

async function sendOTP(event) {
  event.preventDefault();
  const email = document.getElementById('email').value;

  try {
    const response = await fetch('/auth/email/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await response.json();
    if (data.success) {
      showMessage('OTP sent to your email!', 'success');
      document.querySelector('form[onsubmit="sendOTP(event)"]').style.display = 'none';
      document.getElementById('otpForm').style.display = 'block';
    } else {
      showMessage(data.message, 'error');
    }
  } catch (error) {
    showMessage('Failed to send OTP', 'error');
  }
}

async function handleSignIn(event) {
  event.preventDefault();
  const email = document.getElementById('signinEmail').value;
  const password = document.getElementById('signinPassword').value;

  try {
    const userCredential = await signInWithEmailAndPassword(window.firebaseAuth, email, password);
    const user = userCredential.user;
    localStorage.setItem('nordluxeUser', JSON.stringify({
      id: user.uid,
      uid: user.uid,
      name: user.displayName || '',
      email: user.email,
      profilePic: user.photoURL || '',
      provider: user.providerData && user.providerData[0] ? user.providerData[0].providerId : 'email'
    }));
    localStorage.setItem('nordluxeLoggedIn', 'true');
    showMessage('Login successful!', 'success');
    setTimeout(() => window.location.href = 'index.html', 1000);
  } catch (error) {
    const errorMessage = error.message;
    showMessage(errorMessage, 'error');
  }
}

function resolveApiBase() {
  const configuredApiBase = (window.NORDLUXE_API_BASE || '').trim();
  if (configuredApiBase) {
    return configuredApiBase;
  }

  const host = String(window.location.hostname || '').trim();
  const protocol = String(window.location.protocol || '').trim();
  const port = String(window.location.port || '').trim();
  const origin = host ? `${protocol}//${host}${port ? `:${port}` : ''}` : '';

  if (!host || protocol === 'file:') {
    return 'http://127.0.0.1:3001';
  }

  if (host === 'localhost' || host === '127.0.0.1') {
    if (port && port !== '3001') {
      return 'http://127.0.0.1:3001';
    }
    return origin;
  }

  return origin;
}

async function handleForgotPassword() {
  const email = document.getElementById('signinEmail').value.trim();
  const apiBase = resolveApiBase();

  if (!email) {
    showMessage('Enter your email first, then click Forgot Password.', 'error');
    return;
  }

  try {
    const response = await fetch(`${apiBase}/auth/password/reset-request`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = response.headers.get('content-type')?.includes('application/json')
      ? await response.json()
      : { success: false, message: 'Reset service returned an unexpected response.' };

    if (response.ok && data.success) {
      showMessage(data.message || 'If an Email/Password account exists, a reset link has been sent.', 'success');
    } else {
      const backendNotConfigured = response.status === 503 || (data.message && data.message.toLowerCase().includes('not configured'));
      if (backendNotConfigured) {
        await window.sendPasswordResetEmail(window.firebaseAuth, email);
        showMessage('Password reset link sent. Please check your email (and spam folder).', 'success');
        return;
      }
      showMessage(data.message || 'Unable to send reset email.', 'error');
    }
  } catch (error) {
    try {
      await window.sendPasswordResetEmail(window.firebaseAuth, email);
      showMessage('Password reset link sent. Please check your email (and spam folder).', 'success');
    } catch (fallbackError) {
      showMessage('Unable to send reset email right now. Ensure backend is running on port 3001.', 'error');
    }
  }
}

async function handleSignUp(event) {
  event.preventDefault();
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const confirmPassword = document.getElementById('signupConfirmPassword').value;

  if (password !== confirmPassword) {
    showMessage('Passwords do not match', 'error');
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(window.firebaseAuth, email, password);
    const user = userCredential.user;
    localStorage.setItem('nordluxeUser', JSON.stringify({
      id: user.uid,
      uid: user.uid,
      name: name || user.displayName || '',
      email: user.email,
      profilePic: user.photoURL || '',
      provider: 'email'
    }));
    localStorage.setItem('nordluxeLoggedIn', 'true');
    showMessage('Account created successfully!', 'success');
    setTimeout(() => window.location.href = 'index.html', 1000);
  } catch (error) {
    if (error.code === 'auth/email-already-in-use') {
      showMessage('This email already has an account. Please sign in instead.', 'error');
      return;
    }
    showMessage(error.message, 'error');
  }
}

function toggleUserMenu() {
  const dropdown = document.getElementById('userDropdown');
  if (!dropdown) return;
  dropdown.classList.toggle('open');
}

document.addEventListener('click', function(event) {
  const dropdown = document.getElementById('userDropdown');
  const userBtn = document.querySelector('.user-btn');
  if (!dropdown || !userBtn) return;
  if (!dropdown.contains(event.target) && !userBtn.contains(event.target)) {
    dropdown.classList.remove('open');
  }
});

// Ensure AOS animations work and the login box is visible
window.addEventListener('DOMContentLoaded', () => {
  if (window.AOS) {
    AOS.init({ duration: 600, once: true });
  }
});

</script>
